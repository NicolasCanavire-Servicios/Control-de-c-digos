<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Control Producción - Abril 2026</title>
    <!-- Librería para generar PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --primary: #0f172a;
            --accent: #2563eb;
            --success: #16a34a;
            --danger: #ef4444;
            --bg: #f8fafc;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 0;
            color: var(--primary);
            -webkit-tap-highlight-color: transparent;
        }

        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
        }

        .nav-tabs {
            display: flex;
            background: var(--primary);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .tab-btn {
            flex: 1;
            padding: 18px 5px;
            border: none;
            background: none;
            color: rgba(255,255,255,0.6);
            font-weight: 700;
            cursor: pointer;
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        .tab-btn.active {
            color: white;
            background: rgba(255,255,255,0.1);
            box-shadow: inset 0 -4px 0 var(--accent);
        }

        .config-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            padding: 20px;
            background: #fff;
            border-bottom: 1px solid var(--border);
        }

        .field label {
            display: block;
            font-size: 0.7rem;
            font-weight: 800;
            color: #64748b;
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        select {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.9rem;
            background-color: #f1f5f9;
            font-weight: 600;
            color: var(--primary);
        }

        .table-container {
            flex-grow: 1;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }

        th {
            background: #f8fafc;
            padding: 12px 10px;
            text-align: center;
            border-bottom: 2px solid var(--border);
            font-weight: 700;
            color: #475569;
            white-space: nowrap;
        }

        td {
            padding: 8px 6px;
            border-bottom: 1px solid var(--border);
            text-align: center;
        }

        .col-code {
            position: sticky;
            left: 0;
            background: #fff;
            font-weight: 800;
            z-index: 10;
            text-align: left;
            padding-left: 15px;
            min-width: 130px;
            box-shadow: 2px 0 5px rgba(0,0,0,0.03);
            color: var(--accent);
        }

        input[type="number"] {
            width: 50px;
            padding: 8px 4px;
            border: 1px solid var(--border);
            border-radius: 6px;
            text-align: center;
            font-weight: bold;
        }

        .subtotal-col {
            font-weight: 800;
            color: var(--accent);
            background: #f0f7ff;
            min-width: 100px;
        }

        .row-driver {
            background: #fffbeb !important;
            font-weight: bold;
        }

        .check-driver {
            width: 22px;
            height: 22px;
            cursor: pointer;
        }

        .tfoot-totals tr {
            background: #f1f5f9;
            font-weight: 800;
        }

        .label-total-dia {
            position: sticky;
            left: 0;
            background: #f1f5f9;
            text-align: right;
            padding-right: 15px;
            font-size: 0.7rem;
            z-index: 10;
            text-transform: uppercase;
        }

        .day-money {
            color: var(--success);
            font-size: 0.75rem;
        }

        .footer-summary {
            padding: 20px;
            background: #f8fafc;
            border-top: 2px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .total-val {
            font-size: 2rem;
            font-weight: 900;
            color: var(--primary);
        }

        .btn-reset, .btn-pdf {
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-reset { background: var(--danger); }
        .btn-pdf { background: var(--success); }

        .hidden { display: none; }

        /* Estilos específicos para impresión/PDF */
        #pdf-content { padding: 20px; }

        @media (max-width: 768px) {
            .tab-btn { padding: 12px 5px; font-size: 0.7rem; }
            .total-val { font-size: 1.5rem; }
            .footer-summary { flex-direction: column; align-items: stretch; text-align: center; }
            .total-box { text-align: center; margin-top: 10px; }
            .btn-pdf, .btn-reset { justify-content: center; width: 100%; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <nav class="nav-tabs">
        <button class="tab-btn active" id="btn-carga" onclick="showTab('carga')">Carga Diaria</button>
        <button class="tab-btn" id="btn-resumen" onclick="showTab('resumen')">Resumen Mensual</button>
    </nav>

    <div id="view-carga">
        <div class="config-bar">
            <div class="field">
                <label>Semana</label>

                    <option value="S3">Semana 3</option>
                    <option value="S4">Semana 4</option>
                    <option value="S5">Semana 5</option>
                </select>
            </div>
            <div class="field">
                <label>Obra</label>
                <select id="selObra" onchange="renderTable()">
                    <option value="delta">DELTA - CONECTAR</option>
                    <option value="resto">OTRAS OBRAS (RESTO)</option>
                    <option value="subestaciones">TAREAS EN SUBESTACIONES</option>
                </select>
            </div>
            <div class="field">
                <label>Categoría</label>
                <select id="selCat" onchange="renderTable()">
                    <option value="OFICIAL ESPECIALIZADO">OFICIAL ESPECIALIZADO</option>
                    <option value="OFICIAL">OFICIAL</option>
                    <option value="MEDIO Oficial">MEDIO OFICIAL</option>
                    <option value="AYUDANTE">AYUDANTE</option>
                </select>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th class="col-code">COD</th>
                        <th>LUN</th><th>MAR</th><th>MIER</th><th>JUE</th><th>VIE</th><th>SÁB</th>
                        <th>UNID</th>
                        <th>TOTAL $</th>
                    </tr>
                </thead>
                <tbody id="tbodyCarga"></tbody>
                <tfoot id="tfootCarga" class="tfoot-totals"></tfoot>
            </table>
        </div>

        <div class="footer-summary">
            <button class="btn-reset" onclick="limpiarSemana()">BORRAR SEMANA</button>
            <div class="total-box">
                <label style="font-size:0.7rem; font-weight:bold; color: #64748b;">TOTAL SEMANAL ESTIMADO</label>
                <div class="total-val" id="totalSemana">$ 0,00</div>
            </div>
        </div>
    </div>

    <div id="view-resumen" class="hidden">
        <div id="pdf-area">
            <div style="padding:25px; text-align:center; border-bottom: 1px solid var(--border);">
                <h2 style="margin:0; font-weight: 800;">Consolidado Abril 2026</h2>
                <p id="pdf-meta" style="margin:8px 0; color:#64748b; font-size:0.85rem;">Resumen de todas las semanas (incluye adicional conductor)</p>

            <div class="table-container">

                    </thead>
                    <tbody id="tbodyResumen"></tbody>
                </table>
            </div>
            <div class="footer-summary" style="background: var(--primary); color: white;">

                <div class="total-val" id="totalMensual" style="color:#4ade80">$ 0,00</div>
            </div>
        </div>
        <div style="padding: 20px; background: #fff;">
            <button class="btn-pdf" onclick="exportarPDF()">DESCARGAR PDF</button>
        </div>
    </div>
</div>

    };

    const dias = ["LUN", "MAR", "MIER", "JUE", "VIE", "SÁB"];
    let db = JSON.parse(localStorage.getItem('app_prod_final_conductor_v2')) || {};

    function showTab(tab) {
        document.getElementById('view-carga').classList.toggle('hidden', tab !== 'carga');
        document.getElementById('view-resumen').classList.toggle('hidden', tab !== 'resumen');
        document.getElementById('btn-carga').classList.toggle('active', tab === 'carga');
        document.getElementById('btn-resumen').classList.toggle('active', tab === 'resumen');
        if(tab === 'resumen') renderResumen();
        else renderTable();
    }

    function getPrecio(obra, cat, cod) {
        if (basePrecios[obra] && basePrecios[obra][cat] && basePrecios[obra][cat][cod] !== undefined) {
            return basePrecios[obra][cat][cod];
        }
        return 0;
    }

    function renderTable() {
        const obra = document.getElementById('selObra').value;
        const sem = document.getElementById('selSemana').value;
        const cat = document.getElementById('selCat').value;
        const tbody = document.getElementById('tbodyCarga');
        const tfoot = document.getElementById('tfootCarga');
        const lista = codigosObra[obra];
        
        let totSem = 0;
        let dUnid = [0,0,0,0,0,0];
        let dMoney = [0,0,0,0,0,0];

        tbody.innerHTML = "";
        lista.forEach(cod => {
            let tr = document.createElement('tr');
            let uFil = 0;
            let prBase = getPrecio(obra, cat, cod);
            let prCond = getPrecio(obra, "Adic. Cond.", cod);

            tr.innerHTML = `<td class="col-code">${cod}</td>`;

            dias.forEach((d, i) => {
                let idProd = `${obra}_${sem}_${cod}_${d}`;
                let idCond = `${obra}_${sem}_cond_${d}`;
                let val = Number(db[idProd] || 0);
                let esCond = db[idCond] === true;
                
                uFil += val;
                dUnid[i] += val;
                
                let pagoDia = val * prBase;
                if(esCond) pagoDia += (val * prCond);
                
                dMoney[i] += pagoDia;
                tr.innerHTML += `<td><input type="number" min="0" value="${db[idProd] || ""}" oninput="saveData('${idProd}', this.value)"></td>`;
            });

            let subtotalFila = 0;
            dias.forEach((d, i) => {
                let idProd = `${obra}_${sem}_${cod}_${d}`;
                let idCond = `${obra}_${sem}_cond_${d}`;
                let val = Number(db[idProd] || 0);
                let esCond = db[idCond] === true;
                subtotalFila += (val * prBase) + (esCond ? val * prCond : 0);
            });
            
            totSem += subtotalFila;
            tr.innerHTML += `<td>${uFil}</td><td class="subtotal-col">$ ${subtotalFila.toLocaleString('es-AR', {minimumFractionDigits:1})}</td>`;
            tbody.appendChild(tr);
        });

        tfoot.innerHTML = "";
        
        let rC = `<tr class="row-driver"><td class="label-total-dia" style="background:#fffbeb">¿Conductor hoy?</td>`;
        dias.forEach((d, i) => {
            let idCond = `${obra}_${sem}_cond_${d}`;
            let checked = db[idCond] ? 'checked' : '';
            rC += `<td><input type="checkbox" class="check-driver" ${checked} onchange="saveCheck('${idCond}', this.checked)"></td>`;
        });
        rC += `<td colspan="2" style="font-size:0.6rem; color:#b45309">Activa para sumar Adic. Cond.</td></tr>`;

        let rU = `<tr class="footer-row"><td class="label-total-dia">Tot. Unidades</td>`;
        dUnid.forEach(v => rU += `<td>${v}</td>`);
        rU += `<td colspan="2">-</td></tr>`;
        
        let rM = `<tr class="footer-row"><td class="label-total-dia">Dinero Día</td>`;
        dMoney.forEach(v => rM += `<td class="day-money">$ ${v.toLocaleString('es-AR', {maximumFractionDigits:0})}</td>`);
        rM += `<td colspan="2" style="background:var(--primary); color:white">$ ${totSem.toLocaleString('es-AR', {maximumFractionDigits:0})}</td></tr>`;
        
        tfoot.innerHTML = rC + rU + rM;
        document.getElementById('totalSemana').innerText = `$ ${totSem.toLocaleString('es-AR', {minimumFractionDigits:1})}`;
    }

    function renderResumen() {
        const obra = document.getElementById('selObra').value;
        const cat = document.getElementById('selCat').value;
        const tbody = document.getElementById('tbodyResumen');
        const lista = codigosObra[obra];
        const semanas = ["S1", "S2", "S3", "S4", "S5"];
        let tMes = 0;

        tbody.innerHTML = "";
        lista.forEach(cod => {
            let uMes = 0;
            let prBase = getPrecio(obra, cat, cod);
            let prCond = getPrecio(obra, "Adic. Cond.", cod);
            let rowH = `<td class="col-code">${cod}</td>`;
            let subtotalCodMes = 0;

            semanas.forEach(s => {
                let uS = 0;
                let subS = 0;
                dias.forEach(d => {
                    let val = Number(db[`${obra}_${s}_${cod}_${d}`] || 0);
                    let esCond = db[`${obra}_${s}_cond_${d}`] === true;
                    uS += val;
                    subS += (val * prBase) + (esCond ? val * prCond : 0);
                });
                uMes += uS;
                subtotalCodMes += subS;
                rowH += `<td>${uS > 0 ? uS : '-'}</td>`;
            });

            if(uMes > 0) {
                tMes += subtotalCodMes;
                let tr = document.createElement('tr');
                tr.innerHTML = rowH + `<td style="font-weight:bold; background:#f1f5f9">${uMes}</td><td class="subtotal-col" style="background:#dcfce7; color:#166534">$ ${subtotalCodMes.toLocaleString('es-AR', {minimumFractionDigits:1})}</td>`;
                tbody.appendChild(tr);
            }
        });
        document.getElementById('totalMensual').innerText = `$ ${tMes.toLocaleString('es-AR', {minimumFractionDigits:1})}`;
    }

    function exportarPDF() {
        const element = document.getElementById('pdf-area');
        const opt = {
            margin:       [10, 10],
            filename:     'Resumen_Produccion_Abril_2026.pdf',
            image:        { type: 'jpeg', quality: 0.98 },
            html2canvas:  { scale: 2, useCORS: true },
            jsPDF:        { unit: 'mm', format: 'a4', orientation: 'landscape' }
        };
        html2pdf().set(opt).from(element).save();
    }

    function saveData(id, val) {
        db[id] = val;
        localStorage.setItem('app_prod_final_conductor_v2', JSON.stringify(db));
        clearTimeout(window.t_u);
        window.t_u = setTimeout(() => renderTable(), 400);
    }

    function saveCheck(id, val) {
        db[id] = val;
        localStorage.setItem('app_prod_final_conductor_v2', JSON.stringify(db));
        renderTable();
    }

    function limpiarSemana() {
        if(confirm("¿Estás seguro de borrar todos los datos de esta SEMANA y OBRA?")) {
            const o = document.getElementById('selObra').value;
            const s = document.getElementById('selSemana').value;
            const pre = `${o}_${s}_`;
            Object.keys(db).forEach(k => { if(k.startsWith(pre)) delete db[k]; });
            localStorage.setItem('app_prod_final_conductor_v2', JSON.stringify(db));
            renderTable();
        }
    }

    renderTable();
</script>
